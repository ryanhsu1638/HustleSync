<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HustleSync - 專業斜槓財務系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="gradient-bg text-white py-10 px-6 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">HustleSync</h1>
                <p class="text-slate-400 font-light">斜槓人生，財務掌控</p>
            </div>
            <div class="flex gap-2">
                <button onclick="clearData()" class="bg-red-500/20 hover:bg-red-500/40 text-red-200 px-3 py-2 rounded-lg text-xs font-semibold transition">重置</button>
                <button onclick="exportCSV()" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg text-sm font-semibold transition">匯出 CSV</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 -mt-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs uppercase tracking-wider font-bold mb-1">本月總收入</p>
                <h2 id="total-income" class="text-3xl font-bold text-slate-900">$0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs uppercase tracking-wider font-bold mb-1">距離目標還差</p>
                <h2 id="remaining-goal" class="text-3xl font-bold text-slate-900">$10,000</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-xs uppercase tracking-wider font-bold mb-1">目標達成</p>
                <h2 id="goal-percent" class="text-3xl font-bold text-emerald-600">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-semibold mb-4 text-slate-800">💼 新增收入紀錄</h3>
                <div class="grid grid-cols-1 gap-4">
                    <input type="text" id="income-name" placeholder="項目名稱" class="p-3 rounded-lg border border-slate-200 w-full">
                    <select id="income-category" class="p-3 rounded-lg border border-slate-200 bg-white">
                        <option value="接案">接案</option>
                        <option value="電商">電商</option>
                        <option value="教學">教學</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="number" id="income-amount" placeholder="金額" class="p-3 rounded-lg border border-slate-200">
                    <button onclick="addIncome()" class="bg-slate-900 hover:bg-slate-800 text-white font-semibold py-3 rounded-lg transition">新增紀錄</button>
                    <p id="error-msg" class="text-red-500 text-xs hidden">請輸入正確的項目名稱與大於0的金額</p>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center">
                <h3 class="text-lg font-semibold mb-4 text-slate-800 w-full">📊 收入分佈圖</h3>
                <div class="w-full h-48">
                    <canvas id="incomeChart"></canvas>
                </div>
            </section>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="text-lg font-semibold mb-4 text-slate-800">近期紀錄</h3>
            <div id="income-list" class="space-y-4">
                <p id="empty-msg" class="text-slate-400 text-center py-4 italic">目前還沒有紀錄，趕快新增第一筆吧！</p>
            </div>
        </section>
    </main>

    <script>
        let incomeData = JSON.parse(localStorage.getItem('hustleData')) || [];
        let myChart;

        function updateUI() {
            const list = document.getElementById('income-list');
            const totalDisplay = document.getElementById('total-income');
            const remainingDisplay = document.getElementById('remaining-goal');
            const emptyMsg = document.getElementById('empty-msg');
            
            let total = 0;
            let categories = { "接案": 0, "電商": 0, "教學": 0, "其他": 0 };
            
            // Clear current list
            const items = list.querySelectorAll('.income-item');
            items.forEach(item => item.remove());

            if (incomeData.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
            }
            
            incomeData.slice().reverse().forEach((item, index) => {
                total += parseFloat(item.amount);
                categories[item.category] = (categories[item.category] || 0) + parseFloat(item.amount);
                
                const row = document.createElement('div');
                row.className = 'income-item flex justify-between items-center border-b border-slate-100 pb-4';
                row.innerHTML = `
                    <div>
                        <p class="font-medium text-sm text-slate-700">${item.name}</p>
                        <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500">${item.category}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-emerald-600">+$${parseFloat(item.amount).toLocaleString()}</span>
                        <button onclick="deleteIncome(${incomeData.length - 1 - index})" class="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                `;
                list.appendChild(row);
            });

            totalDisplay.innerText = `$${total.toLocaleString()}`;
            remainingDisplay.innerText = `$${Math.max(0, 10000 - total).toLocaleString()}`;
            document.getElementById('goal-percent').innerText = `${Math.min(100, Math.round((total / 10000) * 100))}%`;
            
            updateChart(categories);
            localStorage.setItem('hustleData', JSON.stringify(incomeData));
        }

        function deleteIncome(index) {
            incomeData.splice(index, 1);
            updateUI();
        }

        function clearData() {
            if (confirm('確定要清除所有資料嗎？(操作無法復原)')) {
                incomeData = [];
                updateUI();
            }
        }

        function exportCSV() {
            if (incomeData.length === 0) return;
            let csv = '項目,類別,金額\n';
            incomeData.forEach(item => csv += `${item.name},${item.category},${item.amount}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'hustle_sync_export.csv';
            a.click();
        }

        function updateChart(categories) {
            const ctx = document.getElementById('incomeChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{ data: Object.values(categories), backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#64748b'] }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function addIncome() {
            const name = document.getElementById('income-name').value;
            const amountInput = document.getElementById('income-amount');
            const category = document.getElementById('income-category').value;
            const errorMsg = document.getElementById('error-msg');
            
            const amount = parseFloat(amountInput.value);

            if(!name || isNaN(amount) || amount <= 0) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');
            
            incomeData.push({ name, amount, category });
            updateUI();
            document.getElementById('income-name').value = '';
            amountInput.value = '';
        }

        updateUI();
    </script>
</body>
</html>
